services:
  sdci-base:
    image: sdci:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - build

  sdci-server:
    image: sdci:latest
    ports:
      - "8842:8842"
    environment:
      - SDCI_SERVER_TOKEN=HELLO_WORLD_123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8842/health"]
      interval: 3s
      timeout: 3s
      retries: 4
      start_period: 1s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/tasks:/app/src/tasks
      - ./:/app/

  sdci-client:
    image: sdci:latest
    command: sdci-cli run http://sdci-server:8842 demo first_param "second param" third_param
    environment:
      - SDCI_TOKEN=HELLO_WORLD_123
    profiles:
      - client-run
    depends_on:
      sdci-server:
        condition: service_healthy
    volumes:
      - ./:/app/
